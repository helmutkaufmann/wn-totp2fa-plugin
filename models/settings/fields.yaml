fields:
  require_mode:
    label: Require 2FA
    type: dropdown
    options:
      off: Off
      all: Required for all backend users
      roles: Required for selected roles
    default: off

  require_roles:
    label: Required roles
    type: checkboxlist
    options: getRequireRolesOptions
    comment: Select backend roles that should be subject to 2FA enforcement.
    trigger:
      action: show
      field: require_mode
      condition: value[roles]
